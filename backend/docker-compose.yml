services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: microservices_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks: [ "backend-net" ]

  kafka:
    image: bitnami/kafka:latest
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    networks: [ "backend-net" ]

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080" # Exposed so you can access the Admin Console
    networks: [ "backend-net" ]

  # --- Discovery & Config ---
  configserver:
    build: ./configserver
    networks: [ "backend-net" ]

  eureka:
    build: ./eureka
    depends_on: [ "configserver" ]
    networks: [ "backend-net" ]

  # --- Microservices (Private) ---
  userservice:
    build: ./userservice
    depends_on: [ "eureka", "postgres" ]
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks: [ "backend-net" ]

  activityservice:
    build: ./activityservice
    depends_on: [ "eureka", "kafka" ]
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks: [ "backend-net" ]

  aiservice:
    build: ./aiservice
    depends_on: [ "eureka" ]
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks: [ "backend-net" ]

  # --- The Only Exposed Service ---
  gateway:
    build: ./gateway
    ports:
      - "8080:8080" # This is the ONLY service accessible via localhost:8080
    depends_on: [ "eureka" ]
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks: [ "backend-net" ]

networks:
  backend-net:
    driver: bridge