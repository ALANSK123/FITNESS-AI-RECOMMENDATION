spring:

  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: aiactivityfitness

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/


server:
  port: 8082



rabbitmq:
  queue:
    name: activity-events
  exchange:
    name: fitness-exchange
  routing:
    key: activity.events