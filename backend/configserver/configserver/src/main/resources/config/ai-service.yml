spring:
  data:
    mongodb:
      uri: ${MONGODB_URL}
      database: airecommendationfitness

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

rabbitmq:
  queue:
    name: activity-events
  exchange:
    name: fitness-exchange
  routing:
    key: activity.events

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

gemini:
  api:
    url: ${GEMINI_URL}
    key: ${GEMINI_KEY}

server:
  port: 8083