services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-microservices_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [ "prod-net" ]

  # RabbitMQ: lightweight replacement for Kafka (~70MB vs Kafka's ~500MB+)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "15672:15672" # Management UI (optional, remove in strict prod)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks: [ "prod-net" ]

  # --- Discovery & Config ---
  configserver:
    build:
      context: ./backend/configserver/configserver
      dockerfile: Dockerfile
    restart: always
    networks: [ "prod-net" ]

  eureka:
    build:
      context: ./backend/eureka/eureka
      dockerfile: Dockerfile
    restart: always
    depends_on: [ "configserver" ]
    networks: [ "prod-net" ]

  # --- Auth Service: lightweight replacement for Keycloak (~50MB vs Keycloak's 600MB+) ---
  authservice:
    build:
      context: ./backend/authservice/authservice
      dockerfile: Dockerfile
    restart: always
    depends_on: [ "eureka", "postgres" ]
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-microservices_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET}
    networks: [ "prod-net" ]

  # --- Microservices ---
  userservice:
    build:
      context: ./backend/userservice/userservice
      dockerfile: Dockerfile
    restart: always
    depends_on: [ "eureka", "postgres" ]
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks: [ "prod-net" ]

  activityservice:
    build:
      context: ./backend/activityservice/activityservice
      dockerfile: Dockerfile
    restart: always
    depends_on: [ "eureka", "rabbitmq" ]
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
    networks: [ "prod-net" ]

  aiservice:
    build:
      context: ./backend/aiservice/aiservice
      dockerfile: Dockerfile
    restart: always
    depends_on: [ "eureka", "rabbitmq" ]
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
    networks: [ "prod-net" ]

  gateway:
    build:
      context: ./backend/gateway/gateway
      dockerfile: Dockerfile
    restart: always
    depends_on: [ "eureka" ]
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks: [ "prod-net" ]

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    networks: [ "prod-net" ]

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
      - frontend
    networks: [ "prod-net" ]

networks:
  prod-net:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
