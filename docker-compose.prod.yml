services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-microservices_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [ "prod-net" ]

  kafka:
    image: bitnami/kafka:latest
    restart: always
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    volumes:
      - kafka_data:/bitnami/kafka
    networks: [ "prod-net" ]

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: always
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
    networks: [ "prod-net" ]

  # --- Discovery & Config ---
  configserver:
    build:
      context: ./backend/configserver/configserver
      dockerfile: Dockerfile
    restart: always
    networks: [ "prod-net" ]

  eureka:
    build:
      context: ./backend/eureka/eureka
      dockerfile: Dockerfile
    restart: always
    depends_on: [ "configserver" ]
    networks: [ "prod-net" ]

  # --- Microservices ---
  userservice:
    build:
      context: ./backend/userservice/userservice
      dockerfile: Dockerfile
    restart: always
    depends_on: [ "eureka", "postgres" ]
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks: [ "prod-net" ]

  activityservice:
    build:
      context: ./backend/activityservice/activityservice
      dockerfile: Dockerfile
    restart: always
    depends_on: [ "eureka", "kafka" ]
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks: [ "prod-net" ]

  aiservice:
    build:
      context: ./backend/aiservice/aiservice
      dockerfile: Dockerfile
    restart: always
    depends_on: [ "eureka" ]
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks: [ "prod-net" ]

  gateway:
    build:
      context: ./backend/gateway/gateway
      dockerfile: Dockerfile
    restart: always
    depends_on: [ "eureka" ]
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks: [ "prod-net" ]

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    networks: [ "prod-net" ]

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
      - frontend
    networks: [ "prod-net" ]

networks:
  prod-net:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
