name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build & Push Backend Services
      - name: Build and push Config Server
        uses: docker/build-push-action@v5
        with:
          context: ./backend/configserver/configserver
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fitness-configserver:latest

      - name: Build and push Eureka
        uses: docker/build-push-action@v5
        with:
          context: ./backend/eureka
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fitness-eureka:latest

      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend/gateway/gateway
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fitness-gateway:latest

      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/userservice/userservice
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fitness-userservice:latest

      - name: Build and push Activity Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/activityservice/activityservice
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fitness-activityservice:latest

      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/aiservice/aiservice
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fitness-aiservice:latest

      # Build & Push Auth Service (replaces Keycloak)
      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/authservice/authservice
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fitness-authservice:latest

      # Build & Push Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fitness-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/fitness-ai-recommendation
            git pull origin main
            # Update images and restart
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
